name: Frontend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
  workflow_dispatch:

jobs:
  test:
    name: Run Jest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/mobile
          npm ci

      - name: Run tests
        run: |
          cd apps/mobile
          npm test
